services:

  backend:
    build:
      context: ./backend
    container_name: inventory-backend
    ports:
      - "10000:10000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: inventory-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend